name: Generate Pacman Contribution Graph

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    name: Generate and publish SVGs
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Generate Pacman SVGs
        uses: abozanona/pacman-contribution-graph@v5.0.0
        with:
          github_user_name: ${{ github.repository_owner }}
          games: pacman

      - name: Publish SVGs to pacman-output
        uses: crazy-max/ghaction-github-pages@v5
        with:
          target_branch: pacman-output
          build_dir: dist
          commit_message: "Update Pacman contribution graph"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
